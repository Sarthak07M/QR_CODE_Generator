<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Generator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card" aria-labelledby="title">
        <p class="eyebrow">Smart Utility</p>
        <h1 id="title">QR Code Generator</h1>
        <p class="subtitle">
          Select QR type, fill details, generate instantly, and download as PNG.
        </p>

        <div class="form-group">
          <label for="qr-type">Select QR Type</label>
          <select id="qr-type">
            <option value="website">Website URL</option>
            <option value="phone">Phone Number</option>
            <option value="email">Email</option>
            <option value="sms">SMS</option>
            <option value="wifi">WiFi</option>
            <option value="upi">UPI Payment</option>
            <option value="contact">Contact (vCard)</option>
            <option value="location">Google Maps Location</option>
          </select>
        </div>

        <!-- Dynamic inputs for the selected QR type are inserted here. -->
        <div id="dynamic-fields" class="dynamic-fields"></div>

        <div class="actions">
          <button id="generate-btn" type="button">Generate QR</button>
          <button id="download-btn" type="button" disabled>Download PNG</button>
        </div>

        <p id="status-message" class="status" aria-live="polite"></p>

        <p class="payload-label">Generated QR Value</p>
        <pre id="payload-preview" class="payload-preview">No value generated yet.</pre>

        <div id="qr-output" class="qr-output" aria-live="polite">
          <div id="loader" class="loader hidden" aria-hidden="true"></div>

          <!-- qrcode.js draws canvas/img content inside this box. -->
          <div id="qr-container" class="qr-container" aria-label="Generated QR code"></div>
        </div>
      </section>
    </main>

    <!-- qrcode.js library for QR generation in browser. -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
